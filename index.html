<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<title>SMOOT/H — STO Speedometer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap');

  :root {
    --bg: #020408;
    --accent: #ff6a00;
    --accent2: #ffb300;
    --accent-glow: rgba(255,106,0,0.6);
    --cyan: #00e5ff;
    --cyan-glow: rgba(0,229,255,0.4);
    --white: #f0f4ff;
    --dim: #3a4a5a;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width:100%; height:100%;
    background:var(--bg);
    overflow:hidden;
    font-family:'Rajdhani',sans-serif;
    touch-action:none;
    user-select:none;
  }

  /* ── STARFIELD ── */
  #starfield {
    position:fixed; inset:0;
    pointer-events:none;
    z-index:0;
  }

  /* ── LAYOUT ── */
  #app {
    position:relative;
    width:100vw; height:100vh;
    display:flex; align-items:center; justify-content:center;
    z-index:1;
  }

  #speedo-wrap {
    position:relative;
    width:min(88vh, 64vw);
    aspect-ratio:1;
    filter:drop-shadow(0 0 40px rgba(255,106,0,0.15));
  }

  #speedo-svg { width:100%; height:100%; overflow:visible; }

  /* ── SIDE PANELS ── */
  .side-panel {
    position:absolute;
    top:50%; transform:translateY(-50%);
    display:flex; flex-direction:column; gap:10px;
    z-index:2;
  }
  #panel-left  { right:calc(100% + 14px); align-items:flex-end; }
  #panel-right { left:calc(100% + 14px);  align-items:flex-start; }

  .data-block {
    background:linear-gradient(135deg,rgba(6,12,20,.95),rgba(10,21,32,.9));
    border:1px solid rgba(0,229,255,.2);
    border-radius:4px;
    padding:7px 12px;
    min-width:108px;
    position:relative; overflow:hidden;
  }
  .data-block::before {
    content:''; position:absolute;
    left:0; top:0; bottom:0; width:3px;
    background:var(--accent);
  }
  .data-label {
    font-family:'Rajdhani',sans-serif;
    font-size:9px; font-weight:600;
    letter-spacing:2px; color:var(--dim);
    text-transform:uppercase;
  }
  .data-value {
    font-family:'Orbitron',monospace;
    font-size:17px; font-weight:700;
    color:var(--cyan);
    text-shadow:0 0 12px var(--cyan-glow);
    line-height:1.1;
  }
  .data-unit {
    font-family:'Rajdhani',sans-serif;
    font-size:9px; font-weight:600;
    color:var(--accent); letter-spacing:1px;
  }

  /* ── TOP BAR ── */
  #top-bar {
    position:fixed; top:0; left:0; right:0; height:34px;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 18px;
    background:linear-gradient(to bottom,rgba(2,4,8,.92),transparent);
    z-index:5;
  }
  #wordmark {
    font-family:'Orbitron',monospace;
    font-size:11px; font-weight:900; letter-spacing:6px;
    color:var(--accent); text-shadow:0 0 12px var(--accent-glow);
  }
  #model-tag {
    font-family:'Rajdhani',sans-serif;
    font-size:10px; font-weight:600;
    letter-spacing:4px; color:var(--dim); text-transform:uppercase;
  }

  /* ── CORNERS ── */
  .corner { position:fixed; width:56px; height:56px; z-index:2; opacity:.4; }
  .corner svg { width:100%; height:100%; }
  .tl { top:10px; left:10px; }
  .tr { top:10px; right:10px; transform:scaleX(-1); }
  .bl { bottom:56px; left:10px; transform:scaleY(-1); }
  .br { bottom:56px; right:10px; transform:scale(-1); }

  /* ── GPS STATUS ── */
  #gps-status {
    position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:6px;
    z-index:10;
  }
  #gps-pill {
    display:flex; align-items:center; gap:8px;
    background:rgba(6,12,20,.92);
    border:1px solid rgba(0,229,255,.25);
    border-radius:20px; padding:6px 16px;
  }
  #gps-dot {
    width:8px; height:8px; border-radius:50%;
    background:#3a4a5a; flex-shrink:0;
    transition:background .4s;
  }
  #gps-dot.searching { background:#ffb300; animation:pulse-dot 1s infinite; }
  #gps-dot.active    { background:#00e5ff; box-shadow:0 0 8px #00e5ff; }
  #gps-dot.error     { background:#ff1a1a; }
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.2} }
  #gps-label {
    font-family:'Rajdhani',sans-serif;
    font-size:10px; font-weight:600;
    letter-spacing:3px; color:var(--dim);
    text-transform:uppercase; white-space:nowrap;
  }
  #gps-accuracy {
    font-family:'Orbitron',monospace;
    font-size:9px; color:var(--dim); letter-spacing:1px;
  }

  /* ── STARTUP OVERLAY ── */
  #startup-overlay {
    position:fixed; inset:0; z-index:200;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:#020408;
    transition:opacity .7s ease;
  }
  #startup-overlay.fade-out { opacity:0; pointer-events:none; }

  #startup-logo {
    font-family:'Orbitron',monospace;
    font-size:clamp(20px,5vw,36px); font-weight:900;
    letter-spacing:10px; color:#ff6a00;
    text-shadow:0 0 30px rgba(255,106,0,.9),0 0 80px rgba(255,106,0,.3);
    opacity:0; transform:scale(.88);
    transition:opacity .45s ease, transform .45s ease;
  }
  #startup-logo.show { opacity:1; transform:scale(1); }

  #startup-sub {
    font-family:'Rajdhani',sans-serif;
    font-size:clamp(9px,2vw,13px); font-weight:600;
    letter-spacing:6px; color:#3a4a5a;
    margin-top:10px; opacity:0;
    text-transform:uppercase;
    transition:opacity .45s ease .2s;
  }
  #startup-sub.show { opacity:1; }

  #startup-line {
    width:0; height:1px; margin-top:20px;
    background:linear-gradient(to right,transparent,#ff6a00,transparent);
    transition:width .7s ease .3s;
  }
  #startup-line.show { width:clamp(160px,28vw,280px); }

  /* ── ANIMATIONS ── */
  @keyframes redline-pulse { 0%,100%{opacity:1} 50%{opacity:.15} }
  .redline-active { animation:redline-pulse .28s infinite; }
</style>
</head>
<body>

<!-- Startup overlay: sits above everything, fades out after sweep -->
<div id="startup-overlay">
  <div id="startup-logo">SMOOT/H</div>
  <div id="startup-sub">Velocity Interface</div>
  <div id="startup-line"></div>
</div>

<canvas id="starfield"></canvas>

<div id="top-bar">
  <div id="wordmark">SMOOT/H</div>
  <div id="model-tag">GPS</div>
</div>

<div class="corner tl"><svg viewBox="0 0 60 60"><polyline points="0,60 0,0 60,0" stroke="#00e5ff" stroke-width="1.5" fill="none"/><polyline points="10,60 10,10 60,10" stroke="#00e5ff" stroke-width="0.5" fill="none" opacity="0.4"/></svg></div>
<div class="corner tr"><svg viewBox="0 0 60 60"><polyline points="0,60 0,0 60,0" stroke="#00e5ff" stroke-width="1.5" fill="none"/><polyline points="10,60 10,10 60,10" stroke="#00e5ff" stroke-width="0.5" fill="none" opacity="0.4"/></svg></div>
<div class="corner bl"><svg viewBox="0 0 60 60"><polyline points="0,60 0,0 60,0" stroke="#ff6a00" stroke-width="1.5" fill="none"/></svg></div>
<div class="corner br"><svg viewBox="0 0 60 60"><polyline points="0,60 0,0 60,0" stroke="#ff6a00" stroke-width="1.5" fill="none"/></svg></div>

<div id="app">
  <div id="speedo-wrap">

    <div class="side-panel" id="panel-left">
      <div class="data-block">
        <div class="data-label">Smoot/H</div>
        <div class="data-value" id="val-smoot">0.00</div>
      </div>
      <div class="data-block">
        <div class="data-label">km/h</div>
        <div class="data-value" id="val-kmh">0.0</div>
      </div>
      <div class="data-block">
        <div class="data-label">mph</div>
        <div class="data-value" id="val-mph">0.0</div>
      </div>
    </div>

    <div class="side-panel" id="panel-right">
      <div class="data-block">
        <div class="data-label">Peak</div>
        <div class="data-value" id="val-peak">0.00</div>
        <div class="data-unit">SMOOT/H</div>
      </div>
      <div class="data-block">
        <div class="data-label">Mode</div>
        <div class="data-value" id="val-mode" style="font-size:13px;color:var(--accent)">STRADA</div>
      </div>
      <div class="data-block">
        <div class="data-label">Accuracy</div>
        <div class="data-value" id="val-acc" style="font-size:13px">—</div>
        <div class="data-unit">METRES</div>
      </div>
    </div>

    <!--
      SVG NEEDLE DESIGN NOTE
      ======================
      The dial spans START_ANG=-225° to END_ANG=45° (270° sweep), measured
      clockwise from 12-o'clock (SVG convention: 0°=top, CW positive).

      updateDial() computes:  dialAngle = START_ANG + (speed/MAX)*270
        At speed=0  → dialAngle = -225°  (bottom-left, ~7-o'clock)
        At speed=MAX→ dialAngle =   45°  (bottom-right, ~5-o'clock)

      The needle polygon is drawn pointing UPWARD in local space (tip at y=88,
      pivot at cx=250,cy=250). We apply:
        transform="rotate(dialAngle, 250, 250)"
      so at dialAngle=-225 the needle points to bottom-left. ✓
    -->
    <svg id="speedo-svg" viewBox="0 0 500 500">
      <defs>
        <pattern id="carbon" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
          <rect width="8" height="8" fill="#050a10"/>
          <rect width="4" height="4" fill="#070e16"/>
          <rect x="4" y="4" width="4" height="4" fill="#070e16"/>
        </pattern>
        <radialGradient id="dialFace" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#0d1a28"/>
          <stop offset="70%"  stop-color="#060c14"/>
          <stop offset="100%" stop-color="#020408"/>
        </radialGradient>
        <linearGradient id="needleGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.9"/>
          <stop offset="40%"  stop-color="#ffb300"/>
          <stop offset="100%" stop-color="#ff6a00"/>
        </linearGradient>
        <filter id="glow3" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow8" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
        </filter>
        <filter id="glowNeedle" x="-80%" y="-20%" width="260%" height="140%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Outer bezel -->
      <circle cx="250" cy="250" r="245" fill="#0a0f18" stroke="#1a2535" stroke-width="2"/>
      <circle cx="250" cy="250" r="242" fill="url(#carbon)"/>
      <circle cx="250" cy="250" r="235" fill="none" stroke="#ff6a00" stroke-width="1.5" opacity="0.6"/>
      <circle cx="250" cy="250" r="232" fill="none" stroke="#00e5ff" stroke-width="0.5" opacity="0.3"/>
      <circle cx="250" cy="250" r="226" fill="url(#dialFace)"/>

      <!-- Arc tracks -->
      <path id="arcTrackBg" fill="none" stroke="#0a1520"  stroke-width="22" stroke-linecap="butt"/>
      <path id="arcYellow"  fill="none" stroke="#ffb300"  stroke-width="22" stroke-linecap="butt" opacity="0.3"/>
      <path id="arcRed"     fill="none" stroke="#ff1a1a"  stroke-width="22" stroke-linecap="butt" opacity="0.35"/>
      <path id="arcActive"  fill="none" stroke="#ff6a00"  stroke-width="22" stroke-linecap="butt"/>
      <path id="arcGlow"    fill="none" stroke="#ff6a00"  stroke-width="32" stroke-linecap="butt" opacity="0.18" filter="url(#glow8)"/>

      <!-- Tick marks & labels -->
      <g id="ticks"></g>
      <g id="tickLabels"></g>

      <!-- Hub glow halo -->
      <circle cx="250" cy="250" r="60" fill="none" stroke="#ff6a00" stroke-width="1" opacity="0.15" filter="url(#glow8)"/>

      <!-- Inner hub -->
      <circle cx="250" cy="250" r="58" fill="#03080f" stroke="#0d1e30" stroke-width="1"/>
      <circle cx="250" cy="250" r="50" fill="#060c14" stroke="#ff6a00" stroke-width="0.5" opacity="0.4"/>

      <!--
        NEEDLE — drawn pointing UP in local space.
        Pivot = (250,250). Tip at (250,88). Tail at (250,278).
        rotate(dialAngle, 250,250) swings tip to the right speed position.
      -->
      <g id="needleGlow" transform="rotate(-225, 250, 250)">
        <line x1="250" y1="90" x2="250" y2="260"
              stroke="#ff6a00" stroke-width="10" stroke-linecap="round"
              opacity="0.3" filter="url(#glow8)"/>
      </g>
      <g id="needle" transform="rotate(-225, 250, 250)">
        <!-- tail counterweight -->
        <rect x="247.5" y="258" width="5" height="22" rx="2.5"
              fill="#ff6a00" opacity="0.55"/>
        <!-- main blade: narrow triangle pointing UP -->
        <polygon points="250,90  253.5,250  246.5,250"
                 fill="url(#needleGrad)" filter="url(#glowNeedle)"/>
        <!-- bright tip highlight -->
        <polygon points="250,90  251.2,135  248.8,135"
                 fill="white" opacity="0.75"/>
        <!-- hub cap -->
        <circle cx="250" cy="250" r="11" fill="#ff6a00" stroke="#ffb300" stroke-width="1.5"/>
        <circle cx="250" cy="250" r="5.5" fill="#fff" opacity="0.85"/>
      </g>

      <!-- Digital readout box -->
      <rect x="175" y="308" width="150" height="56" rx="4"
            fill="#03080f" stroke="#1a2535" stroke-width="1"/>
      <rect x="176" y="309" width="3" height="54" rx="1" fill="#ff6a00"/>
      <text id="speedText" x="252" y="347" text-anchor="middle"
            font-family="Orbitron,monospace" font-size="28" font-weight="900"
            fill="#f0f4ff" filter="url(#glow3)">0.00</text>
      <text x="252" y="375" text-anchor="middle"
            font-family="Rajdhani,sans-serif" font-size="11" font-weight="600"
            letter-spacing="3" fill="#ff6a00">SMOOT / H</text>

      <!-- Model badge -->
      <text x="250" y="200" text-anchor="middle"
            font-family="Orbitron,monospace" font-size="11" font-weight="700"
            letter-spacing="5" fill="#1a2535">Smoot Tuning Option</text>

      <!-- Redline label -->
      <text id="redlineText" x="250" y="422" text-anchor="middle"
            font-family="Orbitron,monospace" font-size="10" font-weight="700"
            letter-spacing="3" fill="#ff1a1a" opacity="0">REDLINE</text>
    </svg>
  </div>
</div>

<div id="gps-status">
  <div id="gps-pill">
    <div id="gps-dot"></div>
    <div id="gps-label">Initialising…</div>
  </div>
  <div id="gps-accuracy"></div>
</div>

<script>
// ─────────────────────────────────────────────
// CONSTANTS
// 160 km/h ÷ 1.7018 m/Smoot = 94.018 Smoot/h
// ─────────────────────────────────────────────
const SMOOT_M    = 1.7018;
const MAX_KMH    = 160;
const MAX_SMOOT  = MAX_KMH / SMOOT_M;        // ≈ 94.02
const KMH_PER_SMOOT = SMOOT_M;              // multiply Smoot/h → km/h
const MPH_PER_SMOOT = SMOOT_M / 1.60934;

// Dial geometry (all angles clockwise from 12-o'clock)
const CX = 250, CY = 250;
const R_TRACK  = 188;
const ANG_MIN  = -225;   // 0 Smoot/h  → 7-o'clock
const ANG_MAX  =   45;   // MAX Smoot/h→ 5-o'clock
const ANG_SWEEP = ANG_MAX - ANG_MIN; // 270°

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let liveSmoot  = 0;   // what GPS says
let animSmoot  = 0;   // what the needle shows right now
let peakSmoot  = 0;
let animRafId  = null;
let gpsLive    = false;  // becomes true after startup sweep

// ─────────────────────────────────────────────
// GEOMETRY HELPERS
// ─────────────────────────────────────────────
function smootToDeg(s) {
  return ANG_MIN + (Math.min(s, MAX_SMOOT) / MAX_SMOOT) * ANG_SWEEP;
}

function degToXY(deg, r) {
  const rad = (deg - 90) * Math.PI / 180; // SVG: 0° = top
  return { x: CX + r * Math.cos(rad), y: CY + r * Math.sin(rad) };
}

function arcD(a1, a2, r) {
  const s = degToXY(a1, r), e = degToXY(a2, r);
  const large = (a2 - a1 > 180) ? 1 : 0;
  return `M${s.x} ${s.y} A${r} ${r} 0 ${large} 1 ${e.x} ${e.y}`;
}

// ─────────────────────────────────────────────
// BUILD STATIC DIAL ARCS & TICKS
// ─────────────────────────────────────────────
function buildDial() {
  // Full track background
  document.getElementById('arcTrackBg').setAttribute('d', arcD(ANG_MIN, ANG_MAX, R_TRACK));

  // Yellow 80–95%, Red 95–100%
  const angY0 = smootToDeg(MAX_SMOOT * 0.80);
  const angR0 = smootToDeg(MAX_SMOOT * 0.95);
  document.getElementById('arcYellow').setAttribute('d', arcD(angY0, angR0, R_TRACK));
  document.getElementById('arcRed'   ).setAttribute('d', arcD(angR0, ANG_MAX, R_TRACK));

  // Ticks: major every 10 Smoot/h, minor every 2
  const tickG  = document.getElementById('ticks');
  const labelG = document.getElementById('tickLabels');
  const rOut   = R_TRACK - 12;

  for (let s = 0; s <= MAX_SMOOT + 0.01; s += 2) {
    const isMajor = Math.abs(s % 10) < 0.1;
    const ang     = smootToDeg(s);
    const len     = isMajor ? 20 : 9;
    const p1      = degToXY(ang, rOut);
    const p2      = degToXY(ang, rOut - len);

    const inRed  = s >= MAX_SMOOT * 0.95;
    const inAmb  = s >= MAX_SMOOT * 0.80;

    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', p1.x); line.setAttribute('y1', p1.y);
    line.setAttribute('x2', p2.x); line.setAttribute('y2', p2.y);
    line.setAttribute('stroke',       inRed ? '#ff1a1a' : inAmb ? '#ffb300' : isMajor ? '#60758a' : '#1e2e3e');
    line.setAttribute('stroke-width', isMajor ? 2 : 1);
    line.setAttribute('opacity',      inRed ? '0.9' : inAmb ? '0.8' : '1');
    tickG.appendChild(line);

    if (isMajor) {
      const lp  = degToXY(ang, rOut - 34);
      const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x', lp.x);
      txt.setAttribute('y', lp.y);
      txt.setAttribute('text-anchor','middle');
      txt.setAttribute('dominant-baseline','central');
      txt.setAttribute('font-family','Orbitron,monospace');
      txt.setAttribute('font-size','12');
      txt.setAttribute('font-weight','700');
      txt.setAttribute('fill', inRed ? '#ff1a1a' : inAmb ? '#ffb300' : '#3a5068');
      txt.textContent = Math.round(s);
      labelG.appendChild(txt);
    }
  }
}

// ─────────────────────────────────────────────
// RENDER NEEDLE AT ARBITRARY SMOOT VALUE
// ─────────────────────────────────────────────
function renderNeedle(s) {
  s = Math.max(0, Math.min(MAX_SMOOT, s));
  const deg = smootToDeg(s);

  // Rotate needle and its glow
  const xfm = `rotate(${deg}, ${CX}, ${CY})`;
  document.getElementById('needle'    ).setAttribute('transform', xfm);
  document.getElementById('needleGlow').setAttribute('transform', xfm);

  // Active arc
  if (s > 0.005) {
    const col = s >= MAX_SMOOT*0.95 ? '#ff1a1a' : s >= MAX_SMOOT*0.80 ? '#ffb300' : '#ff6a00';
    const d   = arcD(ANG_MIN, deg, R_TRACK);
    document.getElementById('arcActive').setAttribute('d', d);
    document.getElementById('arcGlow'  ).setAttribute('d', d);
    document.getElementById('arcActive').setAttribute('stroke', col);
    document.getElementById('arcGlow'  ).setAttribute('stroke', col);
  } else {
    document.getElementById('arcActive').setAttribute('d','');
    document.getElementById('arcGlow'  ).setAttribute('d','');
  }

  // Readouts
  const kmh = s * KMH_PER_SMOOT;
  const mph = s * MPH_PER_SMOOT;
  document.getElementById('speedText' ).textContent = s.toFixed(2);
  document.getElementById('val-smoot' ).textContent = s.toFixed(2);
  document.getElementById('val-kmh'   ).textContent = kmh.toFixed(1);
  document.getElementById('val-mph'   ).textContent = mph.toFixed(1);

  // Drive mode
  const pct  = s / MAX_SMOOT;
  const mode = pct < 0.25 ? 'STRADA' : pct < 0.55 ? 'SPORT' : pct < 0.80 ? 'CORSA' : 'STO';
  const col2 = pct < 0.25 ? '#00e5ff' : pct < 0.55 ? '#ffb300' : pct < 0.80 ? '#ff6a00' : '#ff1a1a';
  const mEl  = document.getElementById('val-mode');
  mEl.textContent = mode;
  mEl.style.color = col2;

  // Peak (ignore during sweep — gpsLive guards this)
  if (gpsLive && s > peakSmoot) {
    peakSmoot = s;
    document.getElementById('val-peak').textContent = s.toFixed(2);
  }

  // Redline flash
  const rEl = document.getElementById('redlineText');
  if (s >= MAX_SMOOT * 0.95) {
    rEl.setAttribute('opacity','1');
    rEl.classList.add('redline-active');
  } else {
    rEl.setAttribute('opacity','0');
    rEl.classList.remove('redline-active');
  }
}

// ─────────────────────────────────────────────
// SMOOTH GPS ANIMATION (used after sweep)
// ─────────────────────────────────────────────
function animateTo(target) {
  if (animRafId) cancelAnimationFrame(animRafId);
  function step() {
    const diff = target - animSmoot;
    if (Math.abs(diff) < 0.004) {
      animSmoot = target;
      renderNeedle(animSmoot);
      animRafId = null;
      return;
    }
    animSmoot += diff * 0.13;
    renderNeedle(animSmoot);
    animRafId = requestAnimationFrame(step);
  }
  animRafId = requestAnimationFrame(step);
}

// ─────────────────────────────────────────────
// TWEEN HELPER  (used for startup sweep)
// ─────────────────────────────────────────────
function tween(from, to, ms, ease, onTick, onDone) {
  const t0 = performance.now();
  function frame(now) {
    let p = Math.min(1, (now - t0) / ms);
    // apply easing
    if      (ease === 'easeIn'    ) p = p * p * p;
    else if (ease === 'easeOut'   ) p = 1 - Math.pow(1-p, 3);
    else if (ease === 'easeInOut' ) p = p<.5 ? 4*p*p*p : 1-Math.pow(-2*p+2,3)/2;
    const val = from + (to - from) * p;
    animSmoot = val;
    renderNeedle(val);
    if (p < 1) requestAnimationFrame(frame);
    else { animSmoot = to; renderNeedle(to); if (onDone) onDone(); }
  }
  requestAnimationFrame(frame);
}

function wait(ms, fn) { setTimeout(fn, ms); }

// ─────────────────────────────────────────────
// LFA-STYLE STARTUP SWEEP
// Timeline (ms):
//   0    → logo fades in on overlay
//   500  → needle rockets from 0 → MAX  (480ms, cubic ease-in)
//   980  → needle snaps back to 60%     (140ms, ease-out)
//   1120 → needle sweeps home to 0      (680ms, ease-out)
//   1800 → hold 0 for a beat
//   2000 → overlay fades out
//   2700 → overlay removed, GPS activates
// ─────────────────────────────────────────────
function runStartupSweep() {
  // ensure needle is hard at 0 before we start
  animSmoot = 0;
  renderNeedle(0);

  // Show logo
  wait(80, () => {
    document.getElementById('startup-logo').classList.add('show');
    document.getElementById('startup-sub' ).classList.add('show');
    document.getElementById('startup-line').classList.add('show');
  });

  // Phase 1: slam to MAX
  wait(500, () => {
    tween(0, MAX_SMOOT, 480, 'easeIn', null, () => {

      // Phase 2: snap back to 60%
      wait(20, () => {
        tween(MAX_SMOOT, MAX_SMOOT * 0.60, 140, 'easeOut', null, () => {

          // Phase 3: sweep gracefully to 0
          wait(20, () => {
            tween(MAX_SMOOT * 0.60, 0, 680, 'easeOut', null, () => {

              // Phase 4: overlay fade
              wait(260, () => {
                document.getElementById('startup-overlay').classList.add('fade-out');

                // Phase 5: remove overlay, activate GPS
                wait(700, () => {
                  const ov = document.getElementById('startup-overlay');
                  ov.style.display = 'none';
                  gpsLive = true;
                  // apply any speed that GPS already reported
                  animateTo(liveSmoot);
                });
              });
            });
          });
        });
      });
    });
  });
}

// ─────────────────────────────────────────────
// GPS
// ─────────────────────────────────────────────
const gpsDot   = document.getElementById('gps-dot');
const gpsLabel = document.getElementById('gps-label');
const accVal   = document.getElementById('val-acc');
const accPill  = document.getElementById('gps-accuracy');

function setGpsUI(state, text, acc) {
  gpsDot.className = state;
  gpsLabel.textContent = text;
  if (acc != null) {
    accVal.textContent  = acc.toFixed(0);
    accPill.textContent = `±${acc.toFixed(0)} m accuracy`;
  } else {
    accPill.textContent = '';
  }
}

function onGpsPosition(pos) {
  const mps   = pos.coords.speed != null ? pos.coords.speed : 0;
  const smoot = (mps * 3.6) / KMH_PER_SMOOT;
  liveSmoot = smoot;
  if (gpsLive) animateTo(liveSmoot);
  setGpsUI('active', 'GPS Active', pos.coords.accuracy);
}

function onGpsError(err) {
  const msg = { 1:'Permission denied', 2:'Position unavailable', 3:'GPS timeout' };
  setGpsUI('error', msg[err.code] || 'GPS error', null);
  accVal.textContent = '—';
}

if ('geolocation' in navigator) {
  setGpsUI('searching', 'Acquiring GPS…', null);
  navigator.geolocation.watchPosition(onGpsPosition, onGpsError, {
    enableHighAccuracy: true,
    maximumAge: 1000,
    timeout: 20000
  });
} else {
  setGpsUI('error', 'GPS unavailable', null);
}

// ─────────────────────────────────────────────
// STARFIELD WARP
// ─────────────────────────────────────────────
const canvas = document.getElementById('starfield');
const ctx    = canvas.getContext('2d');
let   stars  = [];

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}

function makeStar(scatter) {
  return {
    x:  (Math.random() - 0.5) * canvas.width,
    y:  (Math.random() - 0.5) * canvas.height,
    z:  scatter ? Math.random() * canvas.width : canvas.width,
    pz: canvas.width
  };
}

function initStars() {
  stars = [];
  for (let i = 0; i < 220; i++) stars.push(makeStar(true));
}

function drawStars() {
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2;
  ctx.clearRect(0,0,W,H);

  // During sweep treat animSmoot as visual speed factor
  const sf     = Math.min(1, animSmoot / MAX_SMOOT);
  const spd    = 1.5 + sf * 55;
  const target = Math.floor(60 + sf * 240);

  while (stars.length < target) stars.push(makeStar(false));
  if (stars.length > target + 40) stars.length = target;

  for (let i = 0; i < stars.length; i++) {
    const s = stars[i];
    s.pz = s.z;
    s.z -= spd;
    if (s.z <= 0) { Object.assign(s, makeStar(false)); s.pz = s.z; continue; }

    const sx = (s.x / s.z)  * W + cx;
    const sy = (s.y / s.z)  * H + cy;
    const px = (s.x / s.pz) * W + cx;
    const py = (s.y / s.pz) * H + cy;

    const bright = 1 - s.z / W;
    const alpha  = Math.min(1, bright * (0.35 + sf * 0.65));
    const lw     = Math.max(0.4, bright * (1 + sf * 2.5));

    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(sx, sy);

    const col = sf > 0.75
      ? `hsla(${Math.random()>0.5?200:30},80%,80%,${alpha})`
      : sf > 0.4
        ? `rgba(200,220,255,${alpha})`
        : `rgba(240,244,255,${alpha})`;

    ctx.strokeStyle = col;
    ctx.lineWidth   = lw;
    ctx.stroke();

    if (sf < 0.45 && bright > 0.3) {
      ctx.beginPath();
      ctx.arc(sx, sy, Math.max(0.3, bright * 0.8), 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();
    }
  }

  if (sf > 0.45) {
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, 180*sf);
    g.addColorStop(0, `rgba(255,106,0,${0.18*sf})`);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);
  }

  requestAnimationFrame(drawStars);
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
resizeCanvas();
initStars();
buildDial();
renderNeedle(0);   // park needle at 0 (7-o'clock) before sweep
drawStars();
runStartupSweep();

window.addEventListener('resize', () => { resizeCanvas(); initStars(); });
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
</script>
