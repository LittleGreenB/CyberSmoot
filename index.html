<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Cyber Smootometer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Arial Narrow', Arial, sans-serif;
    touch-action: none;
    user-select: none;
  }

  #starfield {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  #ui {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #gauge-wrap {
    position: relative;
    width: min(96vw, 700px);
    aspect-ratio: 2.2 / 1;
  }

  #gauge-svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  #bottom-bar {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    width: min(96vw, 700px);
    padding: 4px 8px 2px;
    border-top: 1px solid rgba(255,255,255,0.15);
    gap: 8px;
  }

  #speed-label {
    font-size: clamp(10px, 2vw, 16px);
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.1em;
    font-weight: 300;
  }

  #gps-status {
    font-size: clamp(9px, 1.5vw, 12px);
    color: rgba(255,255,255,0.3);
    margin-right: auto;
    letter-spacing: 0.05em;
  }

  #unit-label {
    font-size: clamp(10px, 1.8vw, 14px);
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.15em;
  }

  #debug-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.4);
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 0.05em;
  }

  #debug-btn:active { background: rgba(255,255,255,0.15); }
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<div id="ui">
  <div id="gauge-wrap">
    <svg id="gauge-svg" viewBox="0 0 700 330" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow-orange">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-red">
          <feGaussianBlur stdDeviation="4" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="text-glow">
          <feGaussianBlur stdDeviation="6" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Outer arc track background -->
      <path id="track-bg" d="" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="3"/>

      <!-- Dot track -->
      <g id="dot-track"></g>

      <!-- Filled progress arc -->
      <path id="progress-arc" d="" fill="none" stroke-width="3" stroke-linecap="round"/>

      <!-- Redline arc segment (110 zone) -->
      <path id="redline-arc" d="" fill="none" stroke="#cc2200" stroke-width="5" opacity="0.85"/>

      <!-- Tick marks -->
      <g id="ticks"></g>

      <!-- RPM labels -->
      <g id="labels"></g>

      <!-- Decorative inner arc lines -->
      <path id="inner-detail" d="" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

      <!-- Center digital readout -->
      <text id="digital-speed" x="350" y="220" text-anchor="middle" dominant-baseline="middle"
        fill="rgb(100,200,255)" font-size="110" font-family="'Arial Narrow', Arial, sans-serif"
        font-weight="700" font-style="italic" filter="url(#text-glow)" letter-spacing="-4">0</text>

      <!-- Smoot/H sub label -->
      <text x="350" y="274" text-anchor="middle"
        fill="rgba(255,255,255,0.3)" font-size="13" font-family="Arial, sans-serif"
        letter-spacing="3" font-weight="300">SMOOT/H</text>


      <!-- Bottom hexagonal detail lines -->
      <polyline points="280,290 295,310 405,310 420,290"
        fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

    </svg>
  </div>
  <div id="bottom-bar">
    <span id="gps-status">GPS: waiting…</span>
    <span id="speed-label">0</span>
    <span id="unit-label">km/h</span>
    <button id="debug-btn">SIM</button>
  </div>
</div>

<script>
const CX = 350, CY = 330;
const R_OUTER = 290, R_INNER = 260, R_TICK_OUT = 270, R_TICK_IN = 250;
const R_DOT = 285;
const START_ANGLE = 210, END_ANGLE = 330; // degrees from right (0°)
const MAX_RPM = 10;
const MAX_SMOOT = 100;
const SMOOT_PER_MS = 1 / 1676.4;

function toRad(d) { return d * Math.PI / 180; }

function polarToXY(r, angleDeg) {
  const a = toRad(angleDeg);
  return { x: CX + r * Math.cos(a), y: CY + r * Math.sin(a) };
}

function arcPath(r, startDeg, endDeg) {
  const s = polarToXY(r, startDeg);
  const e = polarToXY(r, endDeg);
  const large = (endDeg - startDeg + 360) % 360 > 180 ? 1 : 0;
  return `M ${s.x} ${s.y} A ${r} ${r} 0 ${large} 1 ${e.x} ${e.y}`;
}

const totalSpan = (END_ANGLE - START_ANGLE + 360) % 360;

function speedToAngle(smootH) {
  const frac = Math.min(smootH / 100, 1);
  return START_ANGLE + frac * totalSpan;
}

function rpmToAngle(rpm) {
  return START_ANGLE + (rpm / MAX_RPM) * totalSpan;
}

document.getElementById('track-bg').setAttribute('d', arcPath(R_OUTER, START_ANGLE, END_ANGLE));

const redlineStart = rpmToAngle(6.45);
document.getElementById('redline-arc').setAttribute('d', arcPath(R_OUTER + 2, redlineStart, END_ANGLE));

const dotTrack = document.getElementById('dot-track');
const numDots = 50;
for (let i = 0; i <= numDots; i++) {
  const frac = i / numDots;
  const angle = START_ANGLE + frac * totalSpan;
  const p = polarToXY(R_DOT, angle);
  const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  dot.setAttribute('cx', p.x);
  dot.setAttribute('cy', p.y);
  dot.setAttribute('r', i % 5 === 0 ? 2.2 : 1.1);
  dot.setAttribute('fill', 'rgba(255,255,255,0.25)');
  dotTrack.appendChild(dot);
}

const ticksG = document.getElementById('ticks');
const labelsG = document.getElementById('labels');
for (let step = 0; step <= 10; step++) {
  const smootVal = step * 10;
  const angle = rpmToAngle(step);
  const isRedline = smootVal >= 64.5;
  const outerP = polarToXY(R_TICK_OUT, angle);
  const innerP = polarToXY(isRedline ? R_TICK_IN - 6 : R_TICK_IN, angle);
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', outerP.x); line.setAttribute('y1', outerP.y);
  line.setAttribute('x2', innerP.x); line.setAttribute('y2', innerP.y);
  line.setAttribute('stroke', isRedline ? '#cc2200' : 'rgba(255,255,255,0.9)');
  line.setAttribute('stroke-width', isRedline ? '2.5' : '2');
  ticksG.appendChild(line);

  for (let sub = 1; sub < 5 && step < 10; sub++) {
    const sa = rpmToAngle(step + sub * 0.2);
    const op = polarToXY(R_TICK_OUT, sa);
    const ip = polarToXY(R_TICK_IN + 6, sa);
    const sl = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    sl.setAttribute('x1', op.x); sl.setAttribute('y1', op.y);
    sl.setAttribute('x2', ip.x); sl.setAttribute('y2', ip.y);
    sl.setAttribute('stroke', 'rgba(255,255,255,0.35)');
    sl.setAttribute('stroke-width', '1');
    ticksG.appendChild(sl);
  }

  const labelP = polarToXY(R_TICK_IN - 22, angle);
  const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  text.setAttribute('x', labelP.x);
  text.setAttribute('y', labelP.y);
  text.setAttribute('text-anchor', 'middle');
  text.setAttribute('dominant-baseline', 'middle');
  text.setAttribute('fill', isRedline ? '#ff3300' : 'rgba(255,255,255,0.85)');
  text.setAttribute('font-size', smootVal === 0 || smootVal === 100 ? '16' : '15');
  text.setAttribute('font-family', 'Arial, sans-serif');
  text.setAttribute('font-weight', '400');
  text.textContent = smootVal;
  labelsG.appendChild(text);
}

document.getElementById('inner-detail').setAttribute('d', arcPath(220, START_ANGLE + 5, END_ANGLE - 5));

let currentSmootH = 0, targetSmootH = 0;
let currentAngle = START_ANGLE;

function updateGauge(smootH) {
  const clipped = Math.min(smootH, 100);
  const angle = speedToAngle(clipped);

  const progressArc = document.getElementById('progress-arc');
  if (clipped > 0) {
    const isHot = clipped > 85;
    progressArc.setAttribute('d', arcPath(R_OUTER, START_ANGLE, angle));
    progressArc.setAttribute('stroke', isHot ? '#ff2200' : (clipped > 50 ? '#ff6600' : '#e8a000'));
    progressArc.setAttribute('stroke-width', isHot ? '5' : '3');
    progressArc.setAttribute('filter', isHot ? 'url(#glow-red)' : 'url(#glow-orange)');
    progressArc.setAttribute('opacity', '1');
  } else {
    progressArc.setAttribute('opacity', '0');
  }

  const displayVal = Math.round(smootH);
  const el = document.getElementById('digital-speed');
  el.textContent = displayVal;
  const len = String(displayVal).length;
  el.setAttribute('font-size', len >= 4 ? '72' : len === 3 ? '88' : '110');

  // Colour: light blue (0) → light red (64.5) → dark red (100)
  let r, g, b;
  if (clipped <= 64.5) {
    const t = clipped / 64.5;
    r = Math.round(100 + t * 155);
    g = Math.round(200 - t * 90);
    b = Math.round(255 - t * 145);
  } else {
    const t = (clipped - 64.5) / (100 - 64.5);
    r = Math.round(255 - t * 100);
    g = Math.round(110 - t * 110);
    b = Math.round(110 - t * 110);
  }
  el.setAttribute('fill', `rgb(${r},${g},${b})`);

  document.getElementById('speed-label').textContent = Math.round(smootH * 1.7638);
}

function animateGauge() {
  currentSmootH += (targetSmootH - currentSmootH) * 0.1;
  if (Math.abs(currentSmootH - targetSmootH) < 0.05) currentSmootH = targetSmootH;
  updateGauge(currentSmootH);
  requestAnimationFrame(animateGauge);
}
animateGauge();

// Starfield
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
let stars = [];
const NUM_STARS = 200;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function initStars() {
  stars = [];
  for (let i = 0; i < NUM_STARS; i++) {
    stars.push({
      x: Math.random() * canvas.width - canvas.width / 2,
      y: Math.random() * canvas.height - canvas.height / 2,
      z: Math.random() * canvas.width,
      pz: 0
    });
  }
}
initStars();

function drawStars() {
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const speedFrac = Math.min(targetSmootH / 100, 1);
  const speed = 1 + speedFrac * 28;
  const cx = canvas.width / 2, cy = canvas.height / 2;

  for (let s of stars) {
    s.pz = s.z;
    s.z -= speed;
    if (s.z <= 0) {
      s.x = Math.random() * canvas.width - cx;
      s.y = Math.random() * canvas.height - cy;
      s.z = canvas.width;
      s.pz = s.z;
    }

    const sx = (s.x / s.z) * canvas.width + cx;
    const sy = (s.y / s.z) * canvas.width + cy;
    const px = (s.x / s.pz) * canvas.width + cx;
    const py = (s.y / s.pz) * canvas.width + cy;

    const size = Math.max(0.4, (1 - s.z / canvas.width) * 3);
    const alpha = Math.min(1, (1 - s.z / canvas.width) * 1.8);

    if (speedFrac > 0.1) {
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.lineTo(sx, sy);
      ctx.strokeStyle = `rgba(200, 210, 255, ${alpha * 0.8})`;
      ctx.lineWidth = size * 0.6;
      ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.arc(sx, sy, size * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200, 210, 255, ${alpha})`;
      ctx.fill();
    }
  }
  requestAnimationFrame(drawStars);
}
drawStars();

// GPS
let gpsWatchId = null;
const gpsStatus = document.getElementById('gps-status');

function startGPS() {
  if (!navigator.geolocation) {
    gpsStatus.textContent = 'GPS: not supported';
    return;
  }
  gpsStatus.textContent = 'GPS: acquiring…';
  gpsWatchId = navigator.geolocation.watchPosition(
    pos => {
      const mps = pos.coords.speed || 0;
      const smootPerSec = mps * SMOOT_PER_MS;
      targetSmootH = smootPerSec * 3600;
      const acc = pos.coords.accuracy ? Math.round(pos.coords.accuracy) + 'm' : '';
      gpsStatus.textContent = `GPS: ±${acc}`;
    },
    err => {
      gpsStatus.textContent = 'GPS: ' + (err.code === 1 ? 'denied' : 'error');
    },
    { enableHighAccuracy: true, maximumAge: 500, timeout: 10000 }
  );
}
startGPS();

// Simulation mode
let simActive = false, simSpeed = 0, simDir = 1, simRAF = null;
document.getElementById('debug-btn').addEventListener('click', () => {
  simActive = !simActive;
  document.getElementById('debug-btn').textContent = simActive ? 'LIVE' : 'SIM';
  if (simActive) {
    if (gpsWatchId) navigator.geolocation.clearWatch(gpsWatchId);
    gpsStatus.textContent = 'SIMULATION MODE';
    let t = 0;
    function simTick() {
      t += 0.008;
      simSpeed = 50 + 45 * Math.sin(t) + 10 * Math.sin(t * 3.7);
      simSpeed = Math.max(0, simSpeed);
      targetSmootH = simSpeed;
      if (simActive) simRAF = requestAnimationFrame(simTick);
    }
    simTick();
  } else {
    cancelAnimationFrame(simRAF);
    targetSmootH = 0;
    startGPS();
  }
});
</script>
</body>
</html>
